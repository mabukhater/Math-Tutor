name: CI

# Gate before deploy: run the web app's unit tests and a production build on
# every PR to main and on pushes to main, so type errors, build breaks, and
# failing tests are caught before Railway deploys `main`.
#
# The build only needs the Supabase client to be *constructable* at prerender
# time (no network calls happen during the build), so placeholder env values are
# enough — no real secrets required. Verified: `next build` succeeds with these.
#
# NOTE: this reports a status check but does not *block* merges on its own. To
# make it a hard gate, add a branch protection rule on `main` requiring the
# "test-build" check to pass before merging.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm ci
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build
