name: Daily question top-up

# Each night tops up the next (curriculum, grade) in rotation with curriculum-
# authentic questions, then verifies them. Writes straight to the DB (no commit).
# Times are UTC; GitHub may delay scheduled runs by a few minutes.
on:
  schedule:
    - cron: "0 8 * * *" # ~4am US Eastern (before the blog run)
  workflow_dispatch: {}

jobs:
  topup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r generator/requirements.txt
      - name: Top up today's slice
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python generator/daily_topup.py
