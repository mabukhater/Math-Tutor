name: Daily question top-up

# Tops up the next (curriculum, grade) in rotation with curriculum-authentic
# questions, then verifies them. Writes straight to the DB (no commit).
#
# PAUSED 2026-07-11 (board review — CFO): the bank already holds ~13.5k vetted
# questions against a handful of active learners, so nightly generation was
# manufacturing inventory nobody consumes (~65% of monthly burn) at zero revenue.
# The schedule below is commented out; re-enable it once there is real demand.
# Still runnable on demand from the Actions tab (workflow_dispatch).
on:
  # schedule:
  #   - cron: "0 8 * * *" # ~4am US Eastern (before the blog run)
  workflow_dispatch: {}

jobs:
  topup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r generator/requirements.txt
      - name: Top up today's slice
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python generator/daily_topup.py
